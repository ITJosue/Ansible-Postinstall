---
- name: Set Homebrew binary and path variables
  set_fact:
    homebrew_bin: "/home/linuxbrew/.linuxbrew/bin/brew"
    homebrew_path: "/home/linuxbrew/.linuxbrew/bin"

- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: "{{ homebrew_bin }}"
  register: brew_check

- name: Install Homebrew (if not already present)
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when: not brew_check.stat.exists
  become: false # Critical: Homebrew must be installed as a regular user

- name: Add Homebrew to .bashrc for persistence
  ansible.builtin.lineinfile:
    path: "~/.bashrc"
    line: 'eval "$({{ homebrew_bin }} shellenv)"'
    regexp: 'linuxbrew/bin/brew shellenv'
    create: yes
    state: present

- name: Add required Homebrew tap
  community.general.homebrew_tap:
    name: "valkyrie00/bbrew"
    state: present
    path: "{{ homebrew_path }}"

- name: Install Homebrew packages from Brewfile
  community.general.homebrew:
    name:
      - "atuin"
      - "bat"
      - "bash-preexec"
      - "valkyrie00/bbrew/bbrew"
      - "chezmoi"
      - "direnv"
      - "dysk"
      - "eza"
      - "fd"
      - "gh"
      - "glab"
      - "rg"
      - "starship"
      - "shellcheck"
      - "stress-ng"
      - "tealdeer"
      - "trash-cli"
      - "television"
      - "ugrep"
      - "yq"
      - "zoxide"
    state: present
    update_homebrew: yes
    path: "{{ homebrew_path }}"
